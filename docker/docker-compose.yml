services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../workspace:/app/workspace
      - ../mvpclaw.config.json:/app/mvpclaw.config.json:ro
      - ../prompts:/app/prompts:ro
      - ../skills:/app/skills:ro
